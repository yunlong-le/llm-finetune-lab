experiment:
  name: qwen_unsloth_sft_smoke
  track: unsloth_sft
model:
  name_or_path: Qwen/Qwen3-0.6B
data:
  train_file: data/samples/sft_train.jsonl
  eval_file: data/samples/sft_eval.jsonl
  max_length: 2048
training:
  output_dir: outputs/unsloth_sft
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  max_steps: 50
  warmup_ratio: 0.1
  logging_steps: 5
  eval_steps: 25
  save_steps: 25
  bf16: true
  gradient_checkpointing: true
