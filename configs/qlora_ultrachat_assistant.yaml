experiment:
  name: qwen_qlora_ultrachat_assistant
  track: qlora
model:
  name_or_path: /root/autodl-tmp/llm-finetune-lab/model/Qwen3-0.6B-Base
data:
  source: ultrachat_local
  path: /root/autodl-tmp/llm-finetune-lab/data/ultrachat_200k
  train_size: 256
  eval_size: 32
  max_chars: 1800
  max_length: 1024
quantization:
  load_in_4bit: true
  quant_type: nf4
  double_quant: false
  compute_dtype: bfloat16
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
training:
  output_dir: outputs/qlora-ultrachat-assistant
  assistant_only_loss: true
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  max_steps: 40
  warmup_ratio: 0.1
  logging_steps: 5
  eval_steps: 20
  save_steps: 40
  bf16: true
  gradient_checkpointing: true
