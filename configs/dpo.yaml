experiment:
  name: qwen_dpo_smoke
  track: dpo
model:
  name_or_path: outputs/sft
data:
  train_file: data/samples/dpo_train.jsonl
  eval_file: data/samples/dpo_eval.jsonl
  max_length: 2048
dpo:
  beta: 0.1
training:
  output_dir: outputs/dpo
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-6
  max_steps: 50
  warmup_ratio: 0.1
  logging_steps: 5
  eval_steps: 25
  save_steps: 25
  bf16: true
  gradient_checkpointing: true
