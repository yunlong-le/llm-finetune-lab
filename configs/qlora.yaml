experiment:
  name: qwen_qlora_smoke
  track: qlora
model:
  name_or_path: Qwen/Qwen3-0.6B
data:
  train_file: data/samples/sft_train.jsonl
  eval_file: data/samples/sft_eval.jsonl
  max_length: 2048
quantization:
  load_in_4bit: true
  quant_type: nf4
  double_quant: false
  compute_dtype: bfloat16
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
training:
  output_dir: outputs/qlora
  assistant_only_loss: true
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  max_steps: 50
  warmup_ratio: 0.1
  logging_steps: 5
  eval_steps: 25
  save_steps: 25
  bf16: true
  gradient_checkpointing: true
