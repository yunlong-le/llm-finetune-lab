experiment:
  name: qwen_dpo_ultrachat_smoke
  track: dpo
model:
  name_or_path: /root/autodl-tmp/llm-finetune-lab/finetuned/Qwen3-0.6B-SFT
data:
  source: ultrachat_dpo
  path: /root/autodl-tmp/llm-finetune-lab/data/ultrachat_200k
